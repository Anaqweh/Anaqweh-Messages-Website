<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>خطأ في الخادم — inexcsuite</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f2444 0%,#1e3a6e 55%,#2a5298 100%);color:#fff;text-align:center;padding:20px;overflow:hidden;position:relative}
body::before,body::after{content:"";position:absolute;border-radius:50%;filter:blur(80px);opacity:.35}
body::before{width:400px;height:400px;background:#34d0ee;top:-140px;right:-100px}
body::after{width:340px;height:340px;background:#0b4ea2;bottom:-120px;left:-80px}
.box{position:relative;z-index:2;max-width:500px}
.brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:36px}
.brand .logo{width:44px;height:44px;background:linear-gradient(135deg,#1e3a6e,#34d0ee);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.brand .bt{font-size:1.3rem;font-weight:700}
.brand .bt span{color:#34d0ee}
.code{font-size:6.5rem;font-weight:900;line-height:1;background:linear-gradient(90deg,#34d0ee,#8be9ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.ic{font-size:3rem;color:#34d0ee;margin-bottom:18px}
h1{font-size:1.6rem;font-weight:800;margin-bottom:12px}
p{color:#c9d8ee;font-size:1.05rem;line-height:1.8;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;background:#34d0ee;color:#08203c;text-decoration:none;padding:14px 34px;border-radius:12px;font-weight:800;font-size:1rem;transition:.2s;box-shadow:0 10px 30px rgba(52,208,238,.35)}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(52,208,238,.5)}
</style>
</head>
<body>
<div class="box">
  <div class="brand"><div class="logo"><i class="bi bi-grid-3x3-gap-fill"></i></div><div class="bt">inexc<span>suite</span></div></div>
  <div class="ic"><i class="bi bi-exclamation-triangle"></i></div>
  <div class="code">500</div>
  <h1>خطأ في الخادم</h1>
  <p>حدث خطأ غير متوقّع في الخادم. فريقنا على علم بالأمر ويعمل على حلّه. يُرجى المحاولة بعد قليل.</p>
  <a href="/" class="btn"><i class="bi bi-house-door"></i> العودة للرئيسية</a>
</div>
</body>
</html>
