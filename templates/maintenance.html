<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="30">
<title>تحسينات جارية — inexcsuite</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Tajawal,Arial,sans-serif;background:linear-gradient(135deg,#0f2444,#1e3a6e 55%,#0b4ea2);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.card{max-width:520px;text-align:center;padding:48px 34px}
.logo{font-size:2rem;font-weight:900;letter-spacing:.5px;margin-bottom:6px}
.logo span{color:#22d3ee}
.sub{font-size:.72rem;letter-spacing:4px;color:#9fb6d9;margin-bottom:36px}
.ic{width:74px;height:74px;margin:0 auto 26px;border:3px solid rgba(255,255,255,.25);border-top-color:#22d3ee;border-radius:50%;animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:1.45rem;font-weight:800;margin:0 0 12px}
p{color:#c9d8ef;line-height:1.9;font-size:.95rem;margin:0}
.note{margin-top:30px;font-size:.78rem;color:#8fa8cc}
</style>
</head>
<body>
<div class="card">
  <div class="logo">inexc<span>suite</span></div>
  <div class="sub">BUSINESS SUITE</div>
  <div class="ic"></div>
  <h1>نجري تحسينات مجدولة على المنصة</h1>
  <p>نعمل حالياً على تطوير تجربتك ورفع أداء النظام.<br>سنعود خلال دقائق معدودة — شكراً لتفهمكم.</p>
  <div class="note">تُحدَّث هذه الصفحة تلقائياً وستفتح المنصة فور اكتمال التحديث</div>
</div>
</body>
</html>
