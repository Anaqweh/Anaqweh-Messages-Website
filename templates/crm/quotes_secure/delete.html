{% extends "base/base.html" %}
{% block title %}حذف عرض سعر{% endblock %}
{% block content %}
<div dir="rtl" style="max-width:640px;margin:40px auto;background:#fff;border:1px solid #d9e4f2;border-radius:10px;padding:24px">
  <h1 style="color:#b42318">حذف عرض السعر</h1>
  <p>هل تريد حذف: <strong>{{ quote.title }}</strong>؟</p>
  <form method="post">
    {% csrf_token %}
    <button style="background:#b42318;color:#fff;border:0;border-radius:8px;padding:10px 16px">نعم، حذف</button>
    <a href="/crm/quotes/{{ quote.pk }}/" style="margin-right:10px">إلغاء</a>
  </form>
</div>
{% endblock %}
