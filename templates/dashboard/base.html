<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}لوحة التحكم{% endblock %} | inexcsuite</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{font-family:Tajawal,sans-serif;box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;color:#1f2d3d;display:flex;min-height:100vh}
.side{width:250px;background:linear-gradient(180deg,#1e3a6e,#2a5298);color:#fff;padding:0;position:fixed;top:0;right:0;height:100vh;overflow-y:auto}
.side .logo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.12)}
.side .logo .box{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center}
.side .logo .txt{font-size:1.15rem;font-weight:500}
.side .logo .txt span{color:#34d0ee}
.side a{display:flex;align-items:center;gap:11px;padding:13px 20px;color:rgba(255,255,255,.8);text-decoration:none;font-size:.95rem;transition:.15s}
.side a:hover,.side a.active{background:rgba(255,255,255,.13);color:#fff;border-right:3px solid #34d0ee}
.main{margin-right:250px;flex:1;padding:0}
.topbar{background:#fff;padding:14px 26px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.topbar .ttl{font-size:1.3rem;font-weight:600;color:#1e3a6e}
.topbar .user{display:flex;align-items:center;gap:14px;font-size:.88rem;color:#475569}
.topbar .user a{color:#0b4ea2;text-decoration:none}
.content{padding:26px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:15px;margin-bottom:26px}
.card{background:#fff;border-radius:14px;padding:19px;box-shadow:0 4px 16px rgba(30,58,110,.06);display:flex;align-items:center;gap:15px}
.card .ic{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;flex-shrink:0}
.card .num{font-size:1.8rem;font-weight:700;line-height:1;color:#1e3a6e}
.card .lbl{font-size:.83rem;color:#64748b;margin-top:4px}
.c-blue{background:#0b4ea2}.c-cyan{background:#00b4d8}.c-green{background:#0f9d58}.c-amber{background:#f0932b}.c-purple{background:#6c5ce7}.c-pink{background:#e84393}
.panel{background:#fff;border-radius:14px;padding:22px;box-shadow:0 4px 16px rgba(30,58,110,.06)}
.panel h2{font-size:1.1rem;font-weight:600;color:#1e3a6e;margin-bottom:14px}
.searchbar{display:flex;gap:10px;margin-bottom:18px}
.searchbar input{flex:1;padding:11px 15px;border:1px solid #cbd5e1;border-radius:10px;font-size:.95rem}
.searchbar button{background:#0b4ea2;color:#fff;border:0;border-radius:10px;padding:11px 22px;font-weight:500;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:13px 15px;text-align:right;border-bottom:1px solid #eef2f7;font-size:.9rem}
th{background:#f7f9fc;color:#6b7a8d;font-weight:600;font-size:.82rem}
td{color:#33404f}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:500}
.badge.ok{background:#e6f7ee;color:#0f9d58}.badge.wait{background:#fef4e6;color:#f0932b}.badge.muted{background:#eef2f7;color:#64748b}
.empty{text-align:center;padding:36px;color:#94a3b8}
.pager{display:flex;gap:8px;justify-content:center;margin-top:18px}
.pager a,.pager span{padding:7px 13px;border-radius:8px;text-decoration:none;font-size:.88rem;border:1px solid #e3ebf5;color:#0b4ea2}
.pager .cur{background:#0b4ea2;color:#fff;border-color:#0b4ea2}
.log-item{padding:10px 0;border-bottom:1px solid #eef2f7;font-size:.9rem;color:#475569;display:flex;justify-content:space-between}
@media(max-width:800px){.side{width:70px}.side .logo .txt,.side a span{display:none}.main{margin-right:70px}}
</style>
</head>
<body>
<nav class="side">
  <div class="logo"><div class="box"><i class="bi bi-grid-3x3-gap-fill"></i></div><div class="txt">inexc<span>suite</span></div></div>
  <a href="/dashboard/" class="{% if active == 'home' %}active{% endif %}"><i class="bi bi-speedometer2"></i><span>نظرة عامة</span></a>
  <a href="/dashboard/companies/" class="{% if active == 'companies' %}active{% endif %}"><i class="bi bi-building"></i><span>الشركات</span></a>
  <a href="/dashboard/customers/" class="{% if active == 'customers' %}active{% endif %}"><i class="bi bi-people"></i><span>العملاء</span></a>
  <a href="/dashboard/registrations/" class="{% if active == 'registrations' %}active{% endif %}"><i class="bi bi-clipboard-check"></i><span>التسجيلات</span></a>
  <a href="/dashboard/payments/" class="{% if active == 'payments' %}active{% endif %}"><i class="bi bi-credit-card"></i><span>المدفوعات</span></a>
  <a href="/accounting/reports/"><i class="bi bi-graph-up-arrow"></i><span>التقارير المالية</span></a>
  <a href="/"><i class="bi bi-house"></i><span>الموقع</span></a>
  <a href="/accounts/logout/"><i class="bi bi-box-arrow-left"></i><span>خروج</span></a>
</nav>
<div class="main">
  <div class="topbar">
    <div class="ttl">{% block heading %}لوحة التحكم{% endblock %}</div>
    <div class="user"><span><i class="bi bi-person-circle"></i> {{ request.user.get_full_name|default:request.user.username }}</span></div>
  </div>
  <div class="content">{% block content %}{% endblock %}</div>
</div>
</body>
</html>
