{% extends "dashboard/base.html" %}
{% block heading %}تغيير كلمة المرور{% endblock %}
{% block content %}
<div class="panel" style="max-width:420px">
{% if messages %}{% for m in messages %}<div style="background:{% if m.tags == 'success' %}#e6f7ee;color:#0f9d58{% else %}#fdecec;color:#e24b4a{% endif %};padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:.9rem">{{ m }}</div>{% endfor %}{% endif %}
<form method="post">{% csrf_token %}
  <div style="margin-bottom:14px"><label style="font-size:.85rem;color:#475569">كلمة المرور الحالية</label><input type="password" name="current_password" required style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:9px"></div>
  <div style="margin-bottom:14px"><label style="font-size:.85rem;color:#475569">كلمة المرور الجديدة</label><input type="password" name="new_password1" required minlength="8" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:9px"></div>
  <div style="margin-bottom:18px"><label style="font-size:.85rem;color:#475569">تأكيد الكلمة الجديدة</label><input type="password" name="new_password2" required minlength="8" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:9px"></div>
  <button type="submit" style="background:#0b4ea2;color:#fff;border:0;border-radius:10px;padding:12px 30px;font-weight:700;cursor:pointer">حفظ كلمة المرور</button>
</form>
</div>
{% endblock %}
