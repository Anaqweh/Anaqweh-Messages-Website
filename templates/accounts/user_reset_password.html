{% extends 'base/base.html' %}
{% block title %}إعادة كلمة المرور{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4" dir="rtl">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-4"><i class="fas fa-key me-2 text-warning"></i>إعادة كلمة مرور: {{ u.username }}</h5>
          {% if messages %}{% for msg in messages %}<div class="alert alert-{{ msg.tags }}">{{ msg }}</div>{% endfor %}{% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">كلمة المرور الجديدة</label>
              <input type="text" name="new_password" class="form-control form-control-lg" placeholder="أدخل كلمة مرور جديدة" required>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-warning px-4 fw-semibold"><i class="fas fa-key me-2"></i>تغيير كلمة المرور</button>
              <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary px-4">إلغاء</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
