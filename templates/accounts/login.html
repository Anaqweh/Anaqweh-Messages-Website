<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول – INEXC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { font-family: 'Tajawal', sans-serif; }
body { min-height: 100vh; background: linear-gradient(135deg, #1e3a6e 0%, #2a5298 50%, #00b4d8 100%); display: flex; align-items: center; justify-content: center; }
.login-card { background: #fff; border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.brand-logo { width: 64px; height: 64px; background: linear-gradient(135deg, #1e3a6e, #00b4d8); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; margin: 0 auto 1rem; }
.btn-login { background: linear-gradient(135deg, #1e3a6e, #2a5298); color: #fff; border: none; border-radius: 10px; padding: .75rem; font-size: 1rem; font-weight: 700; width: 100%; }
.btn-login:hover { opacity: .9; color: #fff; }
.form-control { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: .7rem 1rem; }
.form-control:focus { border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,.15); }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="brand-logo">✉</div>
    <div style="font-size:1.6rem;font-weight:800;color:#1e3a6e;">INEXC</div>
    <div style="font-size:.82rem;color:#718096;">Email Campaign Manager</div>
  </div>
  {% if messages %}{% for message in messages %}<div class="alert alert-danger">{{ message }}</div>{% endfor %}{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-bold">اسم المستخدم</label>
      <input type="text" name="username" class="form-control" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold">كلمة المرور</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn-login">تسجيل الدخول</button>
    <div class="text-center mt-3"><a href="{% url 'accounts:forgot_password' %}" style="color:#1e3a6e;font-size:13px;font-weight:600">نسيت كلمة المرور؟</a> &nbsp;|&nbsp; <a href="{% url 'accounts:forgot_username' %}" style="color:#1e3a6e;font-size:13px;font-weight:600">نسيت اسم المستخدم؟</a></div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
