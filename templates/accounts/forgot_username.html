{% extends "base/base.html" %}
{% block title %}نسيت اسم المستخدم{% endblock %}
{% block page_title %}<i class="bi bi-person-question me-2"></i>نسيت اسم المستخدم{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:440px;margin:0 auto"><div class="card-body p-4">
  <p class="text-muted mb-4">أدخل بريدك الإلكتروني وسيصلك اسم المستخدم المرتبط به.</p>
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-bold">البريد الإلكتروني</label>
    <input type="email" name="email" class="form-control" placeholder="example@email.com" required></div>
    <button class="btn btn-primary w-100">إرسال اسم المستخدم</button>
  </form>
  <div class="text-center mt-3"><a href="{% url 'accounts:login' %}" class="text-muted small">← العودة لتسجيل الدخول</a></div>
</div></div>
{% endblock %}
