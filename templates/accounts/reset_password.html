{% extends "base/base.html" %}
{% block title %}تعيين كلمة مرور جديدة{% endblock %}
{% block page_title %}<i class="bi bi-lock me-2"></i>كلمة مرور جديدة{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:440px;margin:0 auto"><div class="card-body p-4">
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-bold">كلمة المرور الجديدة</label>
    <input type="password" name="new_password" class="form-control" placeholder="6 أحرف على الأقل" required minlength="6"></div>
    <div class="mb-4"><label class="form-label fw-bold">تأكيد كلمة المرور</label>
    <input type="password" name="confirm_password" class="form-control" placeholder="أعد كتابة كلمة المرور" required></div>
    <button class="btn btn-primary w-100">حفظ كلمة المرور الجديدة</button>
  </form>
</div></div>
{% endblock %}
