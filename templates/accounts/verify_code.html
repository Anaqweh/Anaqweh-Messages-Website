{% extends "base/base.html" %}
{% block title %}إدخال رمز التحقق{% endblock %}
{% block page_title %}<i class="bi bi-shield-check me-2"></i>رمز التحقق{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:440px;margin:0 auto"><div class="card-body p-4">
  <p class="text-muted mb-4">أدخل الرمز المكون من 6 أرقام الذي وصلك على بريدك الإلكتروني. الرمز صالح لمدة 15 دقيقة.</p>
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-bold">رمز التحقق</label>
    <input type="text" name="code" class="form-control text-center" style="font-size:28px;letter-spacing:8px" maxlength="6" placeholder="000000" required></div>
    <button class="btn btn-primary w-100">تحقق من الرمز</button>
  </form>
  <div class="text-center mt-3"><a href="{% url 'accounts:forgot_password' %}" class="text-muted small">← إعادة إرسال الرمز</a></div>
</div></div>
{% endblock %}
