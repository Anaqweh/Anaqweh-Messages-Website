<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>التحقق بخطوتين — inexcsuite</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f2444,#1e3a6e 55%,#2a5298);padding:20px}
.box{background:#fff;border-radius:18px;padding:36px 32px;max-width:380px;width:100%;text-align:center}
.ic{font-size:2.2rem;color:#0b4ea2;margin-bottom:14px}
h1{font-size:1.3rem;font-weight:800;margin-bottom:8px;color:#1e3a6e}
p{color:#64748b;font-size:.9rem;margin-bottom:22px}
input{width:100%;padding:14px;border:1px solid #cbd5e1;border-radius:10px;text-align:center;font-size:1.4rem;letter-spacing:6px;margin-bottom:16px}
button{width:100%;background:#0b4ea2;color:#fff;border:0;border-radius:10px;padding:13px;font-weight:700;cursor:pointer}
.err{color:#e24b4a;font-size:.85rem;margin-bottom:14px}
</style></head><body><div class="box">
<div class="ic"><i class="bi bi-shield-lock-fill"></i></div>
<h1>التحقق بخطوتين</h1>
<p>أدخل الرمز من تطبيق المصادقة</p>
{% if error %}<div class="err">{{ error }}</div>{% endif %}
<form method="post">{% csrf_token %}
<input type="text" name="code" maxlength="6" inputmode="numeric" autofocus placeholder="000000">
<button type="submit">تأكيد</button>
</form></div></body></html>
